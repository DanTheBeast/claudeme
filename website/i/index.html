<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join me on CallMe</title>
  <link rel="icon" href="/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #D46B50; --orange-light: #DE7F65; --orange-dark: #C05840;
      --orange-50: #FDF3F0; --orange-100: #FADED8;
      --gray-900: #111827; --gray-700: #374151; --gray-500: #6B7280;
      --gray-400: #9CA3AF; --gray-200: #E5E7EB; --gray-100: #F3F4F6;
      --white: #FFFFFF;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(160deg, #FDFBF9 0%, #FFF5EF 50%, #FFE8D6 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px; -webkit-font-smoothing: antialiased; color: var(--gray-900);
    }
    .card {
      background: var(--white); border: 1px solid var(--gray-100);
      border-radius: 28px; padding: 44px 36px;
      width: 100%; max-width: 380px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.08);
      text-align: center; animation: fade-up 0.4s ease both;
    }
    @keyframes fade-up { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .logo { width: 72px; height: 72px; border-radius: 20px; margin: 0 auto 20px; display: block; box-shadow: 0 4px 24px rgba(212,107,80,0.25); }
    .badge {
      font-size: 13px; font-weight: 600; color: var(--orange);
      background: var(--orange-50); border: 1px solid var(--orange-100);
      display: inline-block; padding: 5px 14px; border-radius: 100px;
      margin-bottom: 16px;
    }
    h1 { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 10px; line-height: 1.2; }
    .sub { font-size: 14px; color: var(--gray-500); line-height: 1.6; margin-bottom: 28px; }
    .code-box {
      background: var(--gray-100); border-radius: 12px; padding: 12px 16px;
      margin-bottom: 20px; font-size: 13px; color: var(--gray-500);
    }
    .code-box strong { font-family: monospace; font-size: 20px; color: var(--gray-900); letter-spacing: 0.08em; display: block; margin-top: 4px; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--orange-light), var(--orange-dark));
      color: white; border: none; border-radius: 14px;
      font-size: 15px; font-weight: 700; font-family: 'DM Sans', sans-serif;
      cursor: pointer; box-shadow: 0 4px 20px rgba(212,107,80,0.3);
      transition: opacity 0.15s, transform 0.1s; text-decoration: none; margin-bottom: 12px;
    }
    .btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-secondary {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 14px; background: var(--white); color: var(--gray-700);
      border: 1.5px solid var(--gray-200); border-radius: 14px;
      font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: background 0.15s; text-decoration: none;
    }
    .btn-secondary:hover { background: var(--gray-100); }
    .divider { font-size: 12px; color: var(--gray-400); margin: 4px 0 12px; }
    .spinner { width: 20px; height: 20px; border: 2px solid var(--gray-200); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <img src="/logo.png" alt="CallMe" class="logo" />
    <div class="spinner" id="spinner"></div>
    <div id="content" style="display:none">
      <div class="badge" id="badge">Invite</div>
      <h1 id="headline">You've been invited to CallMe</h1>
      <p class="sub" id="subtext">CallMe is the app for staying in touch with the people who actually matter.</p>
      <div class="code-box" id="code-box" style="display:none">
        Your invite code<strong id="code-display"></strong>
        Enter this in the app after signing up to connect automatically.
      </div>
      <a id="primary-btn" href="https://apps.apple.com/app/just-call-me-app/id6759512338" class="btn">
        <svg viewBox="0 0 24 24" fill="currentColor" style="width:20px;height:20px;flex-shrink:0"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        Download CallMe
      </a>
      <p class="divider" id="open-divider" style="display:none">Already have the app?</p>
      <a id="open-btn" href="#" class="btn-secondary" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;flex-shrink:0"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Open in CallMe
      </a>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://ibirrcmamficofgdsnvt.supabase.co';
    const SUPABASE_ANON = 'sb_publishable_YA_3uzlBRQI-nyy2492wjQ_ptjJV48p';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { persistSession: false }
    });

    // Extract invite code from path: /i/x7k2m9ab
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const code = pathParts[pathParts.length - 1] || '';

    async function init() {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('content').style.display = 'block';

      if (!code || code === 'i') return; // generic page, no code

      // Look up the invite code to get the inviter's display name
      const { data: invite } = await supabase
        .from('invite_codes')
        .select('inviter_username, used_by')
        .eq('code', code)
        .maybeSingle();

      if (!invite) {
        document.getElementById('badge').textContent = 'Invite link';
        document.getElementById('headline').textContent = 'Join CallMe';
        document.getElementById('subtext').textContent =
          'CallMe is the app for staying in touch with the people who actually matter — no scrolling, no feed, just real conversations.';
        return;
      }

      const name = invite.inviter_username;
      document.getElementById('badge').textContent = '@' + name + ' invited you';
      document.getElementById('headline').textContent = name + ' wants to stay in touch';
      document.getElementById('subtext').textContent =
        'Download CallMe, sign up, and enter the code below to connect with ' + name + ' automatically.';

      // Show the invite code prominently so Josh can enter it after signup
      const codeBox = document.getElementById('code-box');
      document.getElementById('code-display').textContent = code;
      codeBox.style.display = 'block';

      // "Open in CallMe" deep link — for users who already have the app
      const deepLink = 'callme://invite?code=' + encodeURIComponent(code);
      const openBtn = document.getElementById('open-btn');
      openBtn.href = deepLink;
      openBtn.style.display = 'flex';
      document.getElementById('open-divider').style.display = 'block';
    }

    init();
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
